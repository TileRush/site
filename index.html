<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STAFF SERVER</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0a0a0f;
    color: white;
}

/* HERO */
.hero {
    height: 100vh;
    background: linear-gradient(180deg, rgba(10,10,15,0.6), rgba(10,10,15,1)),
                url('https://images.unsplash.com/photo-1605902711622-cfb43c44367f');
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.hero h1 {
    font-size: 60px;
}

.hero p {
    font-size: 20px;
    opacity: 0.8;
}

.btn {
    display: inline-block;
    margin-top: 20px;
    padding: 15px 35px;
    border-radius: 12px;
    background: linear-gradient(45deg, #7b2cff, #00c3ff);
    color: white;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px #7b2cff;
}

/* SECTION */
.section {
    padding: 80px 20px;
    text-align: center;
}

.cards {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
}

.card, .product {
    background: #12121a;
    padding: 25px;
    border-radius: 15px;
    width: 250px;
    transition: 0.3s;
}

.card:hover, .product:hover {
    transform: translateY(-10px);
    box-shadow: 0 0 20px rgba(123,44,255,0.4);
}

.price {
    font-size: 20px;
    color: #00c3ff;
    margin: 10px 0;
}

.footer {
    padding: 30px;
    text-align: center;
    opacity: 0.5;
}
</style>
</head>

<body>

<div class="hero">
    <div>
        <h1>СТАФФ СЕРВЕР</h1>
        <p>Лучший донат без гринда</p>
        <a href="#shop" class="btn">Купить донат</a>
    </div>
</div>

<div class="section">
    <h2>Почему мы?</h2>
    <div class="cards">
        <div class="card">
            <h3>⚡ Быстрый старт</h3>
            <p>50.000.000 при входе</p>
        </div>
        <div class="card">
            <h3>💸 Лёгкий заработок</h3>
            <p>Высокие зарплаты</p>
        </div>
        <div class="card">
            <h3>🎭 RP уровень</h3>
            <p>Строгие правила</p>
        </div>
    </div>
</div>

<div class="section" id="shop">
    <h2>Донат</h2>
    <div class="cards">
        <div class="product">
            <h3>VIP</h3>
            <div class="price">199₽</div>
            <a href="#" class="btn">Купить</a>
        </div>
        <div class="product">
            <h3>PREMIUM</h3>
            <div class="price">499₽</div>
            <a href="#" class="btn">Купить</a>
        </div>
        <div class="product">
            <h3>DELUXE</h3>
            <div class="price">999₽</div>
            <a href="#" class="btn">Купить</a>
        </div>
    </div>
</div>

<div class="footer">
    © 2026 STAFF SERVER
</div>

</body>
</html>
