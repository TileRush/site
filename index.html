<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TileRush</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
<style>
/* Базовые стили */
html, body {margin:0; padding:0; font-family:'Montserrat',sans-serif; background:#121212; color:white; overflow-x:hidden;}
.page {position:absolute; width:100%; top:0; left:0; transition:0.5s;}
.hidden {opacity:0; pointer-events:none; transform:scale(1.02);}

/* HERO */
.hero {height:100vh; display:flex; justify-content:center; align-items:center; text-align:center; flex-direction:column;}
.hero h1 {font-size:64px; background:linear-gradient(90deg,#7b2cff,#00f0ff); -webkit-background-clip:text; color:transparent; margin-bottom:10px;}

/* BUTTON */
.btn {padding:12px 32px; border-radius:10px; background:linear-gradient(90deg,#7b2cff,#00f0ff); color:white; cursor:pointer; transition:0.3s; font-weight:600; border:none; margin-top:15px;}
.btn:hover {transform:scale(1.05);}

/* CARDS */
.cards {display:flex; flex-wrap:wrap; gap:20px; justify-content:center; margin-top:40px;}
.category {background: rgba(255,255,255,0.05); backdrop-filter:blur(10px); padding:25px; border-radius:20px; width:220px; text-align:center; cursor:pointer; transition:0.3s;}
.category:hover {transform:translateY(-5px) scale(1.03); box-shadow:0 0 25px rgba(123,44,255,0.4);}
.back {position:fixed; top:20px; left:20px; cursor:pointer; font-weight:bold; color:white;}

/* КРУТАЯ КАРТОЧКА ТОВАРА */
.product-card {background: rgba(20,20,30,0.95); border-radius:20px; padding:20px; width:300px; max-width:90%; margin:20px auto; text-align:center; box-shadow:0 0 30px rgba(123,44,255,0.5); transition:0.3s;}
.product-card:hover {transform:translateY(-5px) scale(1.02);}
.product-card h3 {font-size:24px; margin-bottom:10px;}
.product-card .price {color:#00f0ff; font-weight:600; margin-bottom:15px;}
.product-card .buy-btn {padding:12px 24px; background:linear-gradient(90deg,#7b2cff,#00f0ff); border:none; border-radius:12px; color:white; font-weight:600; cursor:pointer; transition:0.3s;}
.product-card .buy-btn:hover {transform:scale(1.05);}
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="page">
    <div class="hero">
        <h1>TileRush</h1>
        <p>Минималистичный премиум магазин</p>
        <button class="btn" onclick="showPage('categories')">Открыть магазин</button>
    </div>
</div>

<!-- CATEGORIES -->
<div id="categories" class="page hidden">
    <div class="back" onclick="showPage('home')">← Назад</div>
    <div class="cards">
        <div class="category" onclick="openCategory('priv')">Привилегии</div>
        <div class="category" onclick="openCategory('items')">Прочее</div>
        <div class="category" onclick="openCategory('bonus')">Бонусы</div>
    </div>
</div>

<!-- PRODUCTS -->
<div id="products" class="page hidden">
    <div class="back" onclick="showPage('categories')">← Назад</div>
    <div id="productList"></div>
</div>

<script>
function showPage(id){
    document.querySelectorAll('.page').forEach(p=>p.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
}

function openCategory(type){
    showPage('products');
    const list=document.getElementById('productList');
    list.innerHTML='';
    let items=[];
    if(type==='priv'){items=[{name:'VIP',price:199},{name:'PREMIUM',price:499},{name:'DELUXE',price:999}];}
    if(type==='items'){items=[{name:'Деньги',price:149},{name:'Кейс',price:99}];}
    if(type==='bonus'){items=[{name:'x2 Деньги',price:199},{name:'Буст',price:129}];}

    items.forEach(item=>{
        const card=document.createElement('div');
        card.className='product-card';
        card.innerHTML=`<h3>${item.name}</h3>
                        <div class="price">${item.price}₽</div>
                        <button class="buy-btn" onclick="buyTelegram('${item.name}',${item.price})">Купить</button>`;
        list.appendChild(card);
    });
}

function buyTelegram(name,price){
    // готовое сообщение в Telegram
    const text = encodeURIComponent(`Хочу купить "${name}" за ${price}₽ на TileRush`);
    window.open(`https://t.me/seventeenlanguage?text=${text}`, '_blank');
}
</script>

</body>
</html>
