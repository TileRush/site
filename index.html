<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TileRush</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: radial-gradient(circle at 20% 20%, #111122, #050508);
    color: white;
    overflow-x: hidden;
}

/* PAGES */
.page {
    position: absolute;
    width: 100%;
    top: 0;
    left: 0;
    transition: 0.5s;
}

.hidden {
    opacity: 0;
    transform: scale(1.05);
    pointer-events: none;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.hero h1 {
    font-size: 70px;
    background: linear-gradient(45deg, #7b2cff, #00f0ff);
    -webkit-background-clip: text;
    color: transparent;
}

/* BUTTON */
.btn {
    padding: 15px 40px;
    border-radius: 12px;
    background: linear-gradient(45deg, #7b2cff, #00f0ff);
    color: white;
    text-decoration: none;
    display: inline-block;
    margin-top: 20px;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 25px #7b2cff;
}

/* SECTION */
.section {
    padding: 100px 20px;
    text-align: center;
}

/* CARDS */
.cards {
    display: flex;
    gap: 25px;
    justify-content: center;
    flex-wrap: wrap;
}

/* GLASS */
.card, .product, .category-card {
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    padding: 30px;
    width: 250px;
    transition: 0.4s;
    cursor: pointer;
}

.card:hover, .product:hover, .category-card:hover {
    transform: translateY(-10px) scale(1.05);
    box-shadow: 0 0 30px rgba(123,44,255,0.5);
}

/* CATEGORY */
.category-card {
    font-size: 20px;
}

/* PRODUCTS ANIMATION */
.product {
    opacity: 0;
    transform: translateY(40px);
}

.product.show {
    opacity: 1;
    transform: translateY(0);
}

/* BACK */
.back {
    position: absolute;
    top: 20px;
    left: 20px;
    cursor: pointer;
    opacity: 0.7;
}

.back:hover {
    opacity: 1;
}

/* PRICE */
.price {
    color: #00f0ff;
    margin: 10px 0;
}
</style>
</head>

<body>

<!-- ГЛАВНАЯ -->
<div id="home" class="page">
    <div class="hero">
        <div>
            <h1>TileRush</h1>
            <p>Быстрый старт. Донат без гринда.</p>
            <div class="btn" onclick="openCategories()">Открыть магазин</div>
        </div>
    </div>
</div>

<!-- КАТЕГОРИИ -->
<div id="categories" class="page hidden">
    <div class="back" onclick="goHome()">← Назад</div>

    <div class="section">
        <h2>Категории</h2>
        <div class="cards">
            <div class="category-card" onclick="openCategory('priv')">Привилегии</div>
            <div class="category-card" onclick="openCategory('items')">Прочее</div>
            <div class="category-card" onclick="openCategory('bonus')">Бонусы</div>
        </div>
    </div>
</div>

<!-- ТОВАРЫ -->
<div id="products" class="page hidden">
    <div class="back" onclick="goCategories()">← Назад</div>

    <div class="section">
        <h2 id="categoryTitle">Категория</h2>
        <div class="cards" id="productList"></div>
    </div>
</div>

<script>
function openCategories() {
    hideAll();
    document.getElementById('categories').classList.remove('hidden');
}

function goHome() {
    hideAll();
    document.getElementById('home').classList.remove('hidden');
}

function goCategories() {
    hideAll();
    document.getElementById('categories').classList.remove('hidden');
}

function openCategory(type) {
    hideAll();
    document.getElementById('products').classList.remove('hidden');

    const list = document.getElementById('productList');
    const title = document.getElementById('categoryTitle');

    list.innerHTML = '';

    let items = [];

    if(type === 'priv'){
        title.innerText = 'Привилегии';
        items = [
            {name:'VIP', price:'199₽'},
            {name:'PREMIUM', price:'499₽'},
            {name:'DELUXE', price:'999₽'}
        ];
    }

    if(type === 'items'){
        title.innerText = 'Прочее';
        items = [
            {name:'Деньги', price:'149₽'},
            {name:'Кейс', price:'99₽'}
        ];
    }

    if(type === 'bonus'){
        title.innerText = 'Бонусы';
        items = [
            {name:'x2 Деньги', price:'199₽'},
            {name:'Ускорение', price:'129₽'}
        ];
    }

    items.forEach((item, i) => {
        const el = document.createElement('div');
        el.className = 'product';
        el.innerHTML = `
            <h3>${item.name}</h3>
            <div class="price">${item.price}</div>
            <div class="btn">Купить</div>
        `;
        list.appendChild(el);

        setTimeout(() => {
            el.classList.add('show');
        }, i * 120);
    });
}

function hideAll(){
    document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
}
</script>

</body>
</html>
