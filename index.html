<!DOCTYPE html><html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaspi Clicker</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}.header { padding: 15px; }

.card { background: linear-gradient(135deg, #ff3b6b, #ff7a00); border-radius: 20px; padding: 20px; color: white; font-size: 22px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.2); cursor: pointer; }

.balance { font-size: 28px; margin-top: 10px; }

.menu { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 10px; }

.menu-item { background: white; border-radius: 12px; padding: 15px; text-align: center; font-size: 12px; box-shadow: 0 5px 10px rgba(0,0,0,0.1); }

.bottom { position: fixed; bottom: 0; width: 100%; display: flex; background: white; border-top: 1px solid #ddd; }

.tab { flex: 1; padding: 15px; text-align: center; font-size: 14px; cursor: pointer; }

.active { color: red; }

.shop { padding: 15px; }

.upgrade { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }

button { background: red; color: white; border: none; padding: 8px 12px; border-radius: 8px; } </style>

</head>
<body><div class="header">
    <div class="card" onclick="earn()">
        💳 Нажми на карту
        <div class="balance" id="money">0 ₸</div>
    </div>
</div><div id="main">
    <div class="menu">
        <div class="menu-item">QR</div>
        <div class="menu-item">Банк</div>
        <div class="menu-item">Платежи</div>
        <div class="menu-item">Переводы</div>
    </div>
</div><div id="shop" style="display:none">
    <div class="shop">
        <div class="upgrade">
            Доход +1
            <button onclick="buy(1)">100 ₸</button>
        </div>
        <div class="upgrade">
            Доход +5
            <button onclick="buy(5)">500 ₸</button>
        </div>
    </div>
</div><div class="bottom">
    <div class="tab active" onclick="openTab('main', this)">Главная</div>
    <div class="tab" onclick="openTab('shop', this)">Прокачка</div>
</div><script>
let money = 0;
let income = 1;

function earn() {
    money += income;
    update();
}

function buy(amount) {
    let price = amount * 100;
    if (money >= price) {
        money -= price;
        income += amount;
        update();
    }
}

function update() {
    document.getElementById('money').innerText = money + ' ₸';
}

function openTab(tab, el) {
    document.getElementById('main').style.display = 'none';
    document.getElementById('shop').style.display = 'none';

    document.getElementById(tab).style.display = 'block';

    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
}
</script></body>
</html>
