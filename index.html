<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>СТАФФ</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, Arial;
}

body {
    color: white;
    background: radial-gradient(circle at top, #ff004c, #6a00ff);
    min-height: 100vh;
}

/* КОНТЕЙНЕР */
.container {
    padding: 15px;
}

/* ХЕДЕР */
.header {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

/* ЗАГОЛОВОК */
.title {
    font-size: 32px;
    font-weight: 800;
}

.title .red {
    color: #ff2b2b;
}

/* БАННЕР */
.banner {
    background: rgba(0,0,0,0.4);
    padding: 12px;
    border-radius: 14px;
    font-size: 14px;
}

/* КНОПКИ */
.quick {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
}

.quick button {
    padding: 12px;
    border-radius: 12px;
    border: none;
    font-weight: bold;
    background: rgba(255,255,255,0.1);
    color: white;
}

/* СЕКЦИЯ */
.section {
    margin-top: 15px;
}

/* СЕТКА ТОВАРОВ */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

/* КАРТОЧКА */
.card {
    background: rgba(0,0,0,0.5);
    padding: 12px;
    border-radius: 14px;
}

.card b {
    font-size: 14px;
}

.price {
    font-size: 12px;
    color: #ccc;
    margin-top: 5px;
}

/* КНОПКА */
.buy {
    margin-top: 8px;
    width: 100%;
    padding: 8px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(45deg, #ff2b2b, #ff0066);
    color: white;
    font-size: 13px;
}

/* НИЖНЯЯ ПАНЕЛЬ */
.footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #000;
    padding: 10px;
    text-align: center;
}

.footer button {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: #111;
    color: white;
}
</style>
</head>

<body>

<div class="container">

<div class="header">

<div class="title">
<span class="red">С</span>Т<span class="red">А</span>ФФ
</div>

<div class="banner">
🔥 STAFF — скидка 10% по промокоду
</div>

<div class="quick">
<button>Ассортимент</button>
<button>Филиалы</button>
<button>Акции</button>
</div>

</div>

<!-- ТОВАРЫ СРАЗУ -->
<div class="section">

<h3>🔥 Популярное</h3>

<div class="grid">

<div class="card">
<b>Футболка</b>
<div class="price">100г — 500₽</div>
<button class="buy">Смотреть</button>
</div>

<div class="card">
<b>Худи</b>
<div class="price">100г — 800₽</div>
<button class="buy">Смотреть</button>
</div>

<div class="card">
<b>Джинсы</b>
<div class="price">100г — 700₽</div>
<button class="buy">Смотреть</button>
</div>

<div class="card">
<b>Куртка</b>
<div class="price">100г — 1200₽</div>
<button class="buy">Смотреть</button>
</div>

</div>

</div>

</div>

<div class="footer">
<button onclick="window.open('https://t.me/yourchannel')">
Информация
</button>
</div>

</body>
</html>
