<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TileRush</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

<style>
html, body {
    margin: 0;
    padding: 0;
    background: #050508 !important;
    color: white;
    font-family: 'Montserrat', sans-serif;
    overflow-x: hidden;
}

/* ПЕРЕБИВАЕМ ВСЁ */
* {
    box-sizing: border-box;
}

/* PAGES */
.page {
    position: absolute;
    width: 100%;
    top: 0;
    left: 0;
    transition: 0.4s;
}

.hidden {
    opacity: 0;
    pointer-events: none;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.hero h1 {
    font-size: 60px;
    background: linear-gradient(45deg, #7b2cff, #00f0ff);
    -webkit-background-clip: text;
    color: transparent;
}

/* BUTTON */
.btn {
    padding: 15px 40px;
    border-radius: 12px;
    background: linear-gradient(45deg, #7b2cff, #00f0ff);
    cursor: pointer;
    display: inline-block;
    margin-top: 20px;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.1);
}

/* SECTION */
.section {
    padding: 80px 20px;
    text-align: center;
}

/* CARDS */
.cards {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
}

/* GLASS */
.card, .product, .category {
    background: rgba(255,255,255,0.05);
    padding: 25px;
    border-radius: 15px;
    width: 220px;
    cursor: pointer;
    transition: 0.3s;
}

.card:hover, .product:hover, .category:hover {
    transform: translateY(-8px);
    background: rgba(255,255,255,0.08);
}

/* PRICE */
.price {
    color: #00f0ff;
    margin: 10px 0;
}

/* BACK */
.back {
    position: fixed;
    top: 20px;
    left: 20px;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="page">
    <div class="hero">
        <div>
            <h1>TileRush</h1>
            <p>Донат без гринда</p>
            <div class="btn" onclick="showPage('categories')">Открыть магазин</div>
        </div>
    </div>
</div>

<!-- CATEGORIES -->
<div id="categories" class="page hidden">
    <div class="back" onclick="showPage('home')">← Назад</div>

    <div class="section">
        <h2>Категории</h2>
        <div class="cards">
            <div class="category" onclick="openCategory('priv')">Привилегии</div>
            <div class="category" onclick="openCategory('items')">Прочее</div>
            <div class="category" onclick="openCategory('bonus')">Бонусы</div>
        </div>
    </div>
</div>

<!-- PRODUCTS -->
<div id="products" class="page hidden">
    <div class="back" onclick="showPage('categories')">← Назад</div>

    <div class="section">
        <h2 id="title">Категория</h2>
        <div class="cards" id="list"></div>
    </div>
</div>

<script>
function showPage(id){
    document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
}

function openCategory(type){
    showPage('products');

    const list = document.getElementById('list');
    const title = document.getElementById('title');

    list.innerHTML = '';

    let items = [];

    if(type === 'priv'){
        title.innerText = 'Привилегии';
        items = [
            {name:'VIP', price:'199₽'},
            {name:'PREMIUM', price:'499₽'},
            {name:'DELUXE', price:'999₽'}
        ];
    }

    if(type === 'items'){
        title.innerText = 'Прочее';
        items = [
            {name:'Деньги', price:'149₽'},
            {name:'Кейс', price:'99₽'}
        ];
    }

    if(type === 'bonus'){
        title.innerText = 'Бонусы';
        items = [
            {name:'x2 Деньги', price:'199₽'},
            {name:'Буст', price:'129₽'}
        ];
    }

    items.forEach(item => {
        const el = document.createElement('div');
        el.className = 'product';
        el.innerHTML = `
            <h3>${item.name}</h3>
            <div class="price">${item.price}</div>
            <div class="btn">Купить</div>
        `;
        list.appendChild(el);
    });
}
</script>

</body>
</html>
