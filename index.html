<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TileRush</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(120, 0, 255, 0.22), transparent 28%),
        radial-gradient(circle at 80% 30%, rgba(0, 153, 255, 0.18), transparent 30%),
        radial-gradient(circle at 50% 80%, rgba(255, 0, 128, 0.18), transparent 34%),
        linear-gradient(135deg, #06070d 0%, #0b1020 45%, #090b12 100%);
      color: #ffffff;
      position: relative;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: -20%;
      z-index: 0;
      pointer-events: none;
      filter: blur(60px);
      opacity: 0.9;
      animation: floatGlow 16s ease-in-out infinite alternate;
    }

    body::before {
      background:
        radial-gradient(circle, rgba(131, 56, 236, 0.22) 0%, transparent 45%),
        radial-gradient(circle, rgba(255, 0, 110, 0.14) 0%, transparent 35%);
      transform: translate(-10%, -10%);
    }

    body::after {
      background:
        radial-gradient(circle, rgba(58, 134, 255, 0.18) 0%, transparent 40%),
        radial-gradient(circle, rgba(255, 190, 11, 0.08) 0%, transparent 28%);
      animation-duration: 20s;
      transform: translate(12%, 10%);
    }

    @keyframes floatGlow {
      0% {
        transform: translate(-4%, -3%) scale(1);
      }
      50% {
        transform: translate(4%, 3%) scale(1.08);
      }
      100% {
        transform: translate(0%, 6%) scale(1.02);
      }
    }

    .particles {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 0;
      pointer-events: none;
    }

    .particles span {
      position: absolute;
      display: block;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.7);
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.5);
      animation: rise linear infinite;
    }

    .particles span:nth-child(1)  { left: 8%;  animation-duration: 16s; animation-delay: -2s; top: 105%; }
    .particles span:nth-child(2)  { left: 18%; animation-duration: 20s; animation-delay: -5s; top: 108%; }
    .particles span:nth-child(3)  { left: 26%; animation-duration: 13s; animation-delay: -8s; top: 110%; }
    .particles span:nth-child(4)  { left: 35%; animation-duration: 17s; animation-delay: -3s; top: 107%; }
    .particles span:nth-child(5)  { left: 46%; animation-duration: 19s; animation-delay: -9s; top: 106%; }
    .particles span:nth-child(6)  { left: 57%; animation-duration: 15s; animation-delay: -4s; top: 109%; }
    .particles span:nth-child(7)  { left: 68%; animation-duration: 21s; animation-delay: -7s; top: 105%; }
    .particles span:nth-child(8)  { left: 78%; animation-duration: 14s; animation-delay: -6s; top: 111%; }
    .particles span:nth-child(9)  { left: 88%; animation-duration: 18s; animation-delay: -10s; top: 108%; }
    .particles span:nth-child(10) { left: 94%; animation-duration: 22s; animation-delay: -1s; top: 106%; }

    @keyframes rise {
      0% {
        transform: translateY(0) scale(0.8);
        opacity: 0;
      }
      10% {
        opacity: 0.8;
      }
      80% {
        opacity: 0.35;
      }
      100% {
        transform: translateY(-120vh) scale(1.4);
        opacity: 0;
      }
    }

    .wrapper {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 34px 20px 40px;
    }

    .top-brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 22px;
    }

    .brand-badge {
      width: 74px;
      height: 74px;
      border-radius: 24px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.03)),
        linear-gradient(135deg, #101726, #1a0f2d 55%, #2f1036);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(14px);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        0 16px 40px rgba(0,0,0,0.35),
        0 0 30px rgba(164, 87, 255, 0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }

    .brand-badge img {
      width: 44px;
      height: 44px;
      object-fit: contain;
      opacity: 0.95;
    }

    .hero {
      text-align: center;
      margin-bottom: 34px;
      padding-top: 8px;
    }

    .hero h1 {
      font-size: 50px;
      font-weight: 900;
      letter-spacing: 0.5px;
      line-height: 1.02;
      background: linear-gradient(180deg, #ffffff 0%, #ded7ff 50%, #bca7ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px rgba(159, 102, 255, 0.12);
      margin-bottom: 10px;
    }

    .hero .sub {
      font-size: 18px;
      color: rgba(255,255,255,0.68);
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .section-title {
      text-align: center;
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 24px;
      color: #f4f2ff;
      text-shadow: 0 0 18px rgba(120, 70, 255, 0.2);
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .menu-btn {
      position: relative;
      width: 100%;
      min-height: 96px;
      border: none;
      border-radius: 28px;
      cursor: pointer;
      color: #ffffff;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 0.2px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03)),
        linear-gradient(90deg, #140f1f 0%, #27133c 25%, #4f1d77 58%, #7b1f72 100%);
      border: 1px solid rgba(255,255,255,0.09);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.06),
        0 18px 34px rgba(0,0,0,0.35),
        0 0 26px rgba(160, 78, 255, 0.12);
      backdrop-filter: blur(10px);
      overflow: hidden;
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
    }

    .menu-btn::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 15%, rgba(255,255,255,0.12) 50%, transparent 85%);
      transform: translateX(-130%);
      transition: transform 0.7s ease;
    }

    .menu-btn::after {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: 27px;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      pointer-events: none;
    }

    .menu-btn span {
      position: relative;
      z-index: 2;
    }

    .menu-btn:hover {
      transform: translateY(-4px) scale(1.01);
      border-color: rgba(195, 154, 255, 0.28);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        0 24px 42px rgba(0,0,0,0.42),
        0 0 34px rgba(173, 92, 255, 0.18);
    }

    .menu-btn:hover::before {
      transform: translateX(130%);
    }

    .menu-btn:active {
      transform: scale(0.985);
    }

    @media (max-width: 520px) {
      .wrapper {
        padding: 26px 16px 34px;
      }

      .brand-badge {
        width: 66px;
        height: 66px;
        border-radius: 22px;
      }

      .brand-badge img {
        width: 40px;
        height: 40px;
      }

      .hero h1 {
        font-size: 40px;
      }

      .hero .sub {
        font-size: 16px;
      }

      .section-title {
        font-size: 19px;
      }

      .menu-btn {
        min-height: 88px;
        font-size: 22px;
        border-radius: 24px;
      }

      .menu-btn::after {
        border-radius: 23px;
      }
    }
  </style>
</head>
<body>
  <div class="particles">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <div class="wrapper">
    <div class="top-brand">
      <div class="brand-badge">
        <img src="https://cdn-icons-png.flaticon.com/512/5968/5968267.png" alt="TileRush" />
      </div>
    </div>

    <div class="hero">
      <h1>TileRush</h1>
      <div class="sub">Игровой магазин сервера</div>
    </div>

    <div class="section-title">Выберите категорию</div>

    <div class="menu">
      <button class="menu-btn"><span>Привилегии</span></button>
      <button class="menu-btn"><span>Магазин</span></button>
      <button class="menu-btn"><span>Бонусы</span></button>
      <button class="menu-btn"><span>Жалоба</span></button>
      <button class="menu-btn"><span>Телеграм-канал</span></button>
    </div>
  </div>
</body>
</html>
